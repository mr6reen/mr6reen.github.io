<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Caloriq</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: up 0.3s 0.05s both; }
    .anim-2 { animation: up 0.3s 0.12s both; }
    .anim-3 { animation: up 0.3s 0.18s both; }

    @keyframes punch {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.88); }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .punch { animation: punch 0.35s cubic-bezier(0.34,1.56,0.64,1); }

    #progress-fill { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    .preset-card { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s; }
    .preset-card:active { transform: scale(0.94); box-shadow: none; }

    @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(16px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform: translateX(-50%) translateY(0); }    to { opacity:0; transform: translateX(-50%) translateY(16px); } }
    .toast-in  { animation: toastIn  0.25s ease both; }
    .toast-out { animation: toastOut 0.25s ease both; }

    /* Log item delete reveal */
    .log-item .delete-btn {
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    .log-item.reveal-delete .delete-btn {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .tabs-scroll { scrollbar-width: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }

    /* Overlay slide-up / slide-down */
    @keyframes overlayIn  { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes overlayOut { from { transform: translateY(0); }    to { transform: translateY(100%); } }
    .overlay-in  { animation: overlayIn  0.38s cubic-bezier(0.32, 0.72, 0, 1) both; }
    .overlay-out { animation: overlayOut 0.28s cubic-bezier(0.32, 0,    0.67, 0) both; }

    /* FAB pulse on first appearance */
    @keyframes fabPop { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .fab-pop { animation: fabPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

    [data-js="fab"] { transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1); }
    [data-js="fab"]:active { transform: scale(0.88); }
  </style>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F55E1E"/>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</head>
<body class="bg-[#F7F7F5] font-roboto select-none">

<!-- ════════════════════════════════
     MAIN PAGE
════════════════════════════════ -->
<div class="max-w-lg mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between px-6 pb-3 anim-1"
       style="padding-top: calc(env(safe-area-inset-top, 0px) + 20px)">
    <div>
      <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85]" data-js="header-date"></p>
      <p class="font-anton text-[18px] text-[#18180F] leading-tight">Сегодня</p>
    </div>
    <button onclick="window.location.href='settings.html'"
      class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm active:scale-95 transition-transform">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Calorie widget -->
  <div class="mx-6 bg-white rounded-[22px] p-5 mb-4 anim-2">
    <div class="flex items-end justify-between mb-1">
      <div>
        <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85] mb-1">Осталось</p>
        <p data-js="kcal-remaining" class="font-anton text-[56px] leading-none text-[#18180F]">—</p>
      </div>
      <div class="text-right pb-2">
        <p class="text-[13px] text-[#8C8C85] font-light">из <span data-js="kcal-total" class="font-medium text-[#18180F]">—</span></p>
        <p class="text-[13px] text-[#8C8C85] font-light">съедено <span data-js="kcal-eaten" class="font-medium text-[#18180F]">0</span></p>
      </div>
    </div>
    <div class="h-2 bg-[#F0F0ED] rounded-full overflow-hidden mt-3">
      <div data-js="progress-fill" id="progress-fill" class="h-full rounded-full bg-orange" style="width:0%"></div>
    </div>
    <p data-js="status-label" class="text-[12px] font-light mt-2 min-h-[16px]"></p>
  </div>

  <!-- Today's log -->
  <div data-js="log-section" class="mx-6 mb-4 anim-3">
    <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85] mb-2 px-1">Съедено сегодня</p>
    <div data-js="log-list" class="flex flex-col gap-2"></div>
  </div>

  <!-- Bottom spacer so content clears fixed nav + FAB -->
  <div style="height: calc(env(safe-area-inset-bottom, 0px) + 160px)"></div>

</div>

<!-- ════════════════════════════════
     FAB — log food button
════════════════════════════════ -->
<button data-js="fab" onclick="openOverlay()"
  class="fixed right-5 w-16 h-16 rounded-full bg-orange flex items-center justify-center shadow-2xl fab-pop"
  style="z-index:25; bottom: calc(env(safe-area-inset-bottom, 0px) + 78px)">
  <span style="font-size:30px; line-height:1">😋</span>
</button>

<!-- ════════════════════════════════
     PRESET OVERLAY (full-screen)
════════════════════════════════ -->
<div data-js="overlay" class="hidden fixed inset-0 bg-[#F7F7F5] flex flex-col" style="z-index:30">
  <div class="flex flex-col max-w-lg mx-auto w-full h-full">

    <!-- Overlay header -->
    <div class="flex items-center justify-between px-5 pb-3 bg-[#F7F7F5] shrink-0"
         style="padding-top: calc(env(safe-area-inset-top, 0px) + 16px)">
      <p class="font-anton text-[26px] text-[#18180F] leading-tight">Что съели?</p>
      <div class="flex items-center gap-2">
        <!-- Shown only when presets exist -->
        <button data-js="overlay-create-btn"
          onclick="window.location.href='presets.html'"
          class="hidden h-8 px-3 rounded-full border border-[#E0E0DC] bg-white font-roboto text-[12px] font-medium text-[#8C8C85] active:bg-[#F0F0ED] transition-colors">
          + Создать пресет
        </button>
        <button onclick="closeOverlay()"
          class="w-9 h-9 rounded-full bg-white flex items-center justify-center shadow-sm active:scale-95 transition-transform">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Category tabs -->
    <div class="tabs-scroll flex gap-1 px-5 mb-3 overflow-x-auto shrink-0" data-js="overlay-tabs">
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-orange bg-orange-bg transition-colors duration-150"
        data-tab="all" onclick="switchOverlayTab(this)">Все</button>
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-[#8C8C85] transition-colors duration-150"
        data-tab="breakfast" onclick="switchOverlayTab(this)">Завтрак</button>
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-[#8C8C85] transition-colors duration-150"
        data-tab="lunch" onclick="switchOverlayTab(this)">Обед</button>
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-[#8C8C85] transition-colors duration-150"
        data-tab="dinner" onclick="switchOverlayTab(this)">Ужин</button>
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-[#8C8C85] transition-colors duration-150"
        data-tab="snack" onclick="switchOverlayTab(this)">Перекус</button>
      <button class="overlay-tab shrink-0 px-4 h-9 rounded-full font-roboto text-[13px] font-medium text-[#8C8C85] transition-colors duration-150"
        data-tab="drinks" onclick="switchOverlayTab(this)">Напитки</button>
    </div>

    <!-- Preset grid (scrollable) -->
    <div class="flex-1 overflow-y-auto px-5 pb-6">
      <div data-js="overlay-grid" class="grid grid-cols-3 gap-3"></div>
    </div>

  </div>
</div>

<!-- ════════════════════════════════
     TOAST
════════════════════════════════ -->
<div data-js="toast" class="hidden fixed left-1/2 bg-[#18180F] text-white rounded-2xl px-5 py-3 flex items-center gap-3 z-50 shadow-lg whitespace-nowrap"
     style="bottom: calc(env(safe-area-inset-bottom, 0px) + 88px); transform: translateX(-50%)">
  <span data-js="toast-text" class="font-roboto text-[13px] font-medium"></span>
  <button data-js="toast-undo" onclick="undoLog()" class="font-anton text-[13px] text-orange tracking-wide">ОТМЕНА</button>
</div>

<!-- ════════════════════════════════
     BOTTOM NAV (component)
════════════════════════════════ -->
<div data-js="bottom-nav"></div>
<script src="components/nav.js"></script>

<!-- ════════════════════════════════
     SCRIPTS
════════════════════════════════ -->
<script src="js/global.js"></script>
<script src="js/storage.js"></script>

<script>
  // ── Redirect to onboarding if first launch ─────────────────────
  if (!localStorage.getItem('calories')) {
    window.location.replace('onboarding-1.html');
  }

  // ── State ──────────────────────────────────────────────────────  let presets     = JSON.parse(localStorage.getItem('presets')         || '[]');
  let todayLogs   = JSON.parse(localStorage.getItem('logs_' + today()) || '[]');
  let overlayTab  = 'all';
  let lastLog     = null;
  let toastTimer  = null;

  // ── DOM refs ───────────────────────────────────────────────────
  const kcalRemaining = document.querySelector('[data-js="kcal-remaining"]');
  const kcalTotal     = document.querySelector('[data-js="kcal-total"]');
  const kcalEaten     = document.querySelector('[data-js="kcal-eaten"]');
  const progressFill  = document.querySelector('[data-js="progress-fill"]');
  const statusLabel   = document.querySelector('[data-js="status-label"]');
  const logList       = document.querySelector('[data-js="log-list"]');
  const logSection    = document.querySelector('[data-js="log-section"]');
  const toast         = document.querySelector('[data-js="toast"]');
  const toastText     = document.querySelector('[data-js="toast-text"]');
  const overlay       = document.querySelector('[data-js="overlay"]');
  const overlayGrid   = document.querySelector('[data-js="overlay-grid"]');
  const overlayCreate = document.querySelector('[data-js="overlay-create-btn"]');
  function eaten() {
    return todayLogs.reduce((s, l) => s + l.kcal, 0);
  }

  // ── Widget update ──────────────────────────────────────────────
  function updateWidget() {
    const e   = eaten();
    const rem = DAILY - e;
    const pct = Math.min(100, Math.round((e / DAILY) * 100));

    kcalTotal.textContent     = DAILY.toLocaleString('ru');
    kcalEaten.textContent     = e.toLocaleString('ru');
    kcalRemaining.textContent = rem.toLocaleString('ru');
    progressFill.style.width  = pct + '%';

    progressFill.classList.remove('bg-orange', 'bg-green', 'bg-red-400');
    if (e === 0) {
      progressFill.classList.add('bg-orange');
      statusLabel.textContent = '';
    } else if (rem >= 0) {
      progressFill.classList.add('bg-green');
      statusLabel.textContent = `Отлично — осталось ${rem.toLocaleString('ru')} ккал 🎯`;
      statusLabel.style.color = '#27AE60';
    } else {
      progressFill.classList.add('bg-red-400');
      statusLabel.textContent = `Перебор на ${Math.abs(rem).toLocaleString('ru')} ккал 😬`;
      statusLabel.style.color = '#E74C3C';
    }
  }

  // ── Today's log render ─────────────────────────────────────────
  function renderLog() {
    logList.innerHTML = '';
    if (todayLogs.length === 0) {
      logSection.classList.add('hidden');
      return;
    }
    logSection.classList.remove('hidden');

    [...todayLogs].reverse().forEach((entry, revIdx) => {
      const realIdx = todayLogs.length - 1 - revIdx;
      const item = document.createElement('div');
      item.className = 'log-item bg-white rounded-2xl px-4 py-3 flex items-center gap-3 cursor-pointer active:scale-[0.99] transition-transform';
      item.dataset.idx = realIdx;
      item.onclick = () => toggleDeleteBtn(item);

      // Show photo if present, otherwise emoji
      const icon = entry.photo
        ? `<img src="${entry.photo}" alt="" class="w-10 h-10 rounded-xl object-cover shrink-0"/>`
        : `<span class="text-[22px] w-10 text-center shrink-0">${entry.emoji || '🍽️'}</span>`;

      item.innerHTML = `
        ${icon}
        <div class="flex-1 min-w-0">
          <p class="font-roboto text-[14px] font-medium text-[#18180F] truncate">${entry.name}</p>
          <p class="font-roboto text-[12px] text-[#8C8C85] font-light">${formatTime(entry.time)}</p>
        </div>
        <span class="font-anton text-[15px] text-orange shrink-0">${entry.kcal} ккал</span>
        <button class="delete-btn w-8 h-8 rounded-full bg-red-50 flex items-center justify-center shrink-0"
                onclick="deleteLog(event, ${realIdx})">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
            <path d="M10,11v6"/><path d="M14,11v6"/>
            <path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1V6"/>
          </svg>
        </button>`;
      logList.appendChild(item);
    });
  }

  function toggleDeleteBtn(item) {
    document.querySelectorAll('.log-item.reveal-delete').forEach(el => {
      if (el !== item) el.classList.remove('reveal-delete');
    });
    item.classList.toggle('reveal-delete');
  }

  function deleteLog(e, idx) {
    e.stopPropagation();
    todayLogs.splice(idx, 1);
    saveLogs(todayLogs);
    updateWidget();
    renderLog();
    if (navigator.vibrate) navigator.vibrate(10);
  }

  // ── Log preset ─────────────────────────────────────────────────
  /**
   * Saves preset to today's log, including photo for display in log list.
   * @param {number} idx - index in presets array
   */
  function logPreset(idx) {
    const p = presets[idx];
    todayLogs.push({
      kcal:  p.kcal,
      name:  p.name,
      emoji: p.emoji || '🍽️',
      photo: p.photo || null,   // fix: was missing
      time:  Date.now(),
    });
    lastLog = { logIdx: todayLogs.length - 1, kcal: p.kcal };
    saveLogs(todayLogs);
    updateWidget();
    renderLog();
    scheduleEveningReminder();

    kcalRemaining.classList.remove('punch');
    void kcalRemaining.offsetWidth;
    kcalRemaining.classList.add('punch');

    if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
    showToast(`-${p.kcal} ккал · ${p.name}`);
  }

  // ── Undo ───────────────────────────────────────────────────────
  function undoLog() {
    if (!lastLog) return;
    todayLogs.splice(lastLog.logIdx, 1);
    lastLog = null;
    saveLogs(todayLogs);
    updateWidget();
    renderLog();
    hideToast();
  }

  // ── Toast ──────────────────────────────────────────────────────
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastText.textContent = msg;
    toast.classList.remove('hidden', 'toast-out');
    toast.classList.add('toast-in');
    toastTimer = setTimeout(hideToast, 4000);
  }

  function hideToast() {
    toast.classList.remove('toast-in');
    toast.classList.add('toast-out');
    setTimeout(() => toast.classList.add('hidden'), 250);
  }

  // ── Overlay ────────────────────────────────────────────────────
  function openOverlay() {
    // Refresh presets in case user added some in another tab
    presets = JSON.parse(localStorage.getItem('presets') || '[]');
    overlay.classList.remove('hidden', 'overlay-out');
    overlay.classList.add('overlay-in');
    renderOverlayGrid();
    if (navigator.vibrate) navigator.vibrate(8);
  }

  function closeOverlay() {
    overlay.classList.remove('overlay-in');
    overlay.classList.add('overlay-out');
    setTimeout(() => overlay.classList.add('hidden'), 280);
  }

  function switchOverlayTab(btn) {
    document.querySelectorAll('[data-js="overlay-tabs"] .overlay-tab').forEach(t => {
      t.classList.remove('text-orange', 'bg-orange-bg');
      t.classList.add('text-[#8C8C85]');
    });
    btn.classList.remove('text-[#8C8C85]');
    btn.classList.add('text-orange', 'bg-orange-bg');
    overlayTab = btn.dataset.tab;
    renderOverlayGrid();
  }

  function renderOverlayGrid() {
    overlayGrid.innerHTML = '';

    if (presets.length === 0) {
      // Empty state — full width
      overlayCreate.classList.add('hidden');
      overlayGrid.style.gridTemplateColumns = '1fr';

      const empty = document.createElement('div');
      empty.className = 'flex flex-col items-center justify-center py-20 gap-6';
      empty.innerHTML = `
        <span style="font-size:64px; line-height:1">🍽️</span>
        <div class="text-center">
          <p class="font-anton text-[22px] text-[#18180F] mb-2">Нет пресетов</p>
          <p class="font-roboto text-[14px] text-[#8C8C85] font-light leading-relaxed">
            Создай свои любимые блюда,<br>чтобы быстро их добавлять
          </p>
        </div>
        <button onclick="window.location.href='presets.html'"
          class="px-8 h-14 rounded-2xl bg-orange font-anton text-[16px] tracking-wide text-white active:scale-95 transition-transform shadow-lg">
          Добавить первый пресет
        </button>`;
      overlayGrid.appendChild(empty);
      return;
    }

    // Has presets — show "+ Создать пресет" in header
    overlayCreate.classList.remove('hidden');
    overlayGrid.style.gridTemplateColumns = '';

    const filtered = overlayTab === 'all'
      ? presets
      : presets.filter(p => p.cat === overlayTab);

    filtered.forEach(p => {
      const realIdx = presets.indexOf(p);
      const card = document.createElement('button');
      card.className = 'preset-card bg-white rounded-[18px] p-3 flex flex-col items-center gap-2 shadow-sm';
      card.onclick = () => {
        logPreset(realIdx);
        closeOverlay();
      };
      card.innerHTML = `
        <div class="w-full aspect-square rounded-[12px] bg-orange-bg flex items-center justify-center overflow-hidden text-[30px]">
          ${p.photo
            ? `<img src="${p.photo}" alt="" class="w-full h-full object-cover"/>`
            : (p.emoji || '🍽️')
          }
        </div>
        <div class="w-full">
          <p class="font-roboto text-[12px] font-medium text-[#18180F] truncate leading-tight">${p.name}</p>
          <p class="font-anton text-[15px] text-orange leading-tight">${p.kcal} ккал</p>
        </div>`;
      overlayGrid.appendChild(card);
    });

    // No items for this category
    if (filtered.length === 0) {
      overlayGrid.style.gridTemplateColumns = '1fr';
      const msg = document.createElement('div');
      msg.className = 'col-span-3 py-16 flex flex-col items-center gap-3 text-center';
      msg.innerHTML = `
        <span style="font-size:40px">🤷</span>
        <p class="font-roboto text-[14px] text-[#8C8C85]">В этой категории пусто</p>`;
      overlayGrid.appendChild(msg);
    }
  }

  // ── Date header ────────────────────────────────────────────────
  function setDateHeader() {
    const d = new Date();
    document.querySelector('[data-js="header-date"]').textContent =
      d.toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long' });
  }

  // ── Notifications ──────────────────────────────────────────────
  function initNotifications() {
    if (!('Notification' in window) || !navigator.serviceWorker) return;
    if (todayLogs.length > 0 && Notification.permission === 'default') {
      setTimeout(() => {
        Notification.requestPermission().then(perm => {
          if (perm === 'granted') scheduleEveningReminder();
        });
      }, 2000);
    }
    if (Notification.permission === 'granted') {
      scheduleEveningReminder();
    }
  }

  /**
   * Sends schedule message to SW to fire a notification at 20:00
   * only if user hasn't logged anything after 17:00.
   */
  function scheduleEveningReminder() {
    if (!navigator.serviceWorker.controller) return;
    const now    = new Date();
    const target = new Date();
    target.setHours(20, 0, 0, 0);
    if (now >= target) return;

    const lastLogTime = todayLogs.length > 0
      ? Math.max(...todayLogs.map(l => l.time))
      : 0;

    navigator.serviceWorker.controller.postMessage({
      type:        'SCHEDULE_NOTIFICATION',
      msUntil8pm:  target.getTime() - now.getTime(),
      lastLogTime,
      remaining:   Math.max(0, DAILY - eaten()),
      todayKey:    'logs_' + today(),
    });
  }

  // ── Init ───────────────────────────────────────────────────────
  setDateHeader();
  updateWidget();
  renderLog();
  initNotifications();

  // Refresh state on page restore (back navigation from presets.html etc.)
  window.addEventListener('pageshow', () => {
    presets   = JSON.parse(localStorage.getItem('presets')         || '[]');
    todayLogs = JSON.parse(localStorage.getItem('logs_' + today()) || '[]');
    updateWidget();
    renderLog();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    presets   = JSON.parse(localStorage.getItem('presets')         || '[]');
    todayLogs = JSON.parse(localStorage.getItem('logs_' + today()) || '[]');
    updateWidget();
    renderLog();
  });
</script>
</body>
</html>
