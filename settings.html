<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Caloriq — Настройки</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: up 0.3s 0.05s both; }
    .anim-2 { animation: up 0.3s 0.12s both; }
    .anim-3 { animation: up 0.3s 0.18s both; }
    .anim-4 { animation: up 0.3s 0.24s both; }

    /* Calc panel */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-down { animation: slideDown 0.25s ease both; }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .field:focus { outline: none; border-color: #F55E1E; box-shadow: 0 0 0 3px rgba(245,94,30,0.12); }
    .act-btn.selected { background: #F55E1E; color: #fff; border-color: #F55E1E; }

    /* Toast */
    @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(16px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    .toast-in  { animation: toastIn  0.25s ease both; }
    .toast-out { animation: toastOut 0.2s ease both; }
  </style>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F55E1E"/>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</head>
<body class="bg-[#F7F7F5] font-roboto select-none overflow-hidden h-dvh">

<div class="flex flex-col h-dvh max-w-lg mx-auto">

  <!-- Header -->
  <div class="flex items-center gap-4 px-6 pb-4 anim-1" style="padding-top: calc(env(safe-area-inset-top, 0px) + 20px)">
    <button onclick="window.location.href='index.html'"
      class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm active:scale-95 transition-transform shrink-0">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/>
      </svg>
    </button>
    <div>
      <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85]">Управление</p>
      <p class="font-anton text-[28px] text-[#18180F] leading-tight">Настройки</p>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="flex-1 overflow-y-auto px-6 pb-6 flex flex-col gap-4">

    <!-- ── Daily goal ── -->
    <div class="anim-2">
      <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85] mb-2 px-1">Дневная цель</p>
      <div class="bg-white rounded-[18px] p-5 flex flex-col gap-4">

        <!-- Current value display -->
        <div class="flex items-center justify-between">
          <div>
            <p class="font-roboto text-[13px] text-[#8C8C85] font-light mb-1">Текущая цель</p>
            <p class="font-anton text-[36px] text-[#18180F] leading-none">
              <span data-js="current-calories">—</span>
              <span class="font-roboto text-[16px] text-[#8C8C85] font-light ml-1">ккал</span>
            </p>
          </div>
          <div class="text-right">
            <p class="text-[11px] font-medium text-[#8C8C85] font-light">Цель</p>
            <p data-js="current-goal-label" class="font-roboto text-[14px] font-medium text-orange mt-0.5"></p>
          </div>
        </div>

        <!-- Divider -->
        <div class="h-px bg-[#F0F0ED]"></div>

        <!-- Change calories manually -->
        <div>
          <p class="font-roboto text-[13px] font-medium text-[#18180F] mb-3">Изменить калории</p>
          <div class="flex items-center gap-3">
            <input data-js="input-calories" type="number" placeholder="например, 2000"
              min="800" max="9999"
              class="field flex-1 h-12 rounded-2xl border-2 border-[#E8E8E3] px-4 font-anton text-[22px] text-[#18180F] placeholder:text-[#DDDDD8] transition-all duration-200"/>
            <span class="font-roboto text-[13px] text-[#8C8C85] font-light shrink-0">ккал</span>
          </div>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-3">
          <div class="flex-1 h-px bg-[#E8E8E3]"></div>
          <span class="text-[12px] text-[#B0B0AA] font-light">или</span>
          <div class="flex-1 h-px bg-[#E8E8E3]"></div>
        </div>

        <!-- Recalculate toggle -->
        <div>
          <button data-js="btn-recalc-toggle" onclick="toggleRecalc()"
            class="w-full h-11 rounded-2xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
            Пересчитать по параметрам
            <svg data-js="recalc-chevron" class="w-4 h-4 ml-auto transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6,9 12,15 18,9"/>
            </svg>
          </button>

          <!-- Calc panel -->
          <div data-js="recalc-panel" class="hidden mt-4 flex flex-col gap-3 slide-down">
            <!-- Age / Weight / Height -->
            <div class="flex gap-3">
              <div class="flex-1">
                <label class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#8C8C85] mb-1.5 block">Возраст</label>
                <div class="flex items-center border-b-2 border-[#E8E8E3] pb-1">
                  <input data-js="calc-age" type="number" placeholder="25" min="10" max="100"
                    class="field w-full font-anton text-[24px] text-[#18180F] bg-transparent placeholder:text-[#DDDDD8] transition-all"
                    oninput="tryAutoCalc()"/>
                  <span class="text-[12px] text-[#8C8C85] shrink-0 ml-1">лет</span>
                </div>
              </div>
              <div class="flex-1">
                <label class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#8C8C85] mb-1.5 block">Вес</label>
                <div class="flex items-center border-b-2 border-[#E8E8E3] pb-1">
                  <input data-js="calc-weight" type="number" placeholder="70" min="30" max="300"
                    class="field w-full font-anton text-[24px] text-[#18180F] bg-transparent placeholder:text-[#DDDDD8] transition-all"
                    oninput="tryAutoCalc()"/>
                  <span class="text-[12px] text-[#8C8C85] shrink-0 ml-1">кг</span>
                </div>
              </div>
              <div class="flex-1">
                <label class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#8C8C85] mb-1.5 block">Рост</label>
                <div class="flex items-center border-b-2 border-[#E8E8E3] pb-1">
                  <input data-js="calc-height" type="number" placeholder="170" min="100" max="250"
                    class="field w-full font-anton text-[24px] text-[#18180F] bg-transparent placeholder:text-[#DDDDD8] transition-all"
                    oninput="tryAutoCalc()"/>
                  <span class="text-[12px] text-[#8C8C85] shrink-0 ml-1">см</span>
                </div>
              </div>
            </div>

            <!-- Sex -->
            <div>
              <label class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#8C8C85] mb-2 block">Пол</label>
              <div class="flex gap-2">
                <button data-js="sex-btn" data-sex="male" onclick="pickSex(this)"
                  class="act-btn flex-1 h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] transition-all active:scale-[0.97]">
                  Мужской
                </button>
                <button data-js="sex-btn" data-sex="female" onclick="pickSex(this)"
                  class="act-btn flex-1 h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] transition-all active:scale-[0.97]">
                  Женский
                </button>
              </div>
            </div>

            <!-- Activity -->
            <div>
              <label class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#8C8C85] mb-2 block">Активность</label>
              <div class="flex flex-col gap-2">
                <button data-js="act-btn" data-act="1.2" onclick="pickAct(this)"
                  class="act-btn w-full h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] text-left px-3 transition-all active:scale-[0.97]">
                  🛋 Сидячий образ жизни
                </button>
                <button data-js="act-btn" data-act="1.375" onclick="pickAct(this)"
                  class="act-btn w-full h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] text-left px-3 transition-all active:scale-[0.97]">
                  🚶 Лёгкая (1–3 раза/нед)
                </button>
                <button data-js="act-btn" data-act="1.55" onclick="pickAct(this)"
                  class="act-btn w-full h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] text-left px-3 transition-all active:scale-[0.97]">
                  🏃 Умеренная (3–5 раз/нед)
                </button>
                <button data-js="act-btn" data-act="1.725" onclick="pickAct(this)"
                  class="act-btn w-full h-10 rounded-xl border-2 border-[#E8E8E3] font-roboto text-[13px] font-medium text-[#8C8C85] text-left px-3 transition-all active:scale-[0.97]">
                  💪 Высокая (6–7 раз/нед)
                </button>
              </div>
            </div>

            <!-- Calc result -->
            <div data-js="calc-result" class="hidden bg-orange-bg rounded-2xl px-4 py-3 flex items-center justify-between">
              <div>
                <p class="text-[11px] font-medium tracking-[0.1em] uppercase text-orange mb-0.5">Рекомендуем</p>
                <p data-js="calc-result-value" class="font-anton text-[28px] text-orange leading-none"></p>
              </div>
              <button onclick="applyCalc()"
                class="h-10 px-4 rounded-xl bg-orange text-white font-roboto text-[13px] font-medium active:scale-[0.97] transition-transform">
                Применить
              </button>
            </div>
          </div>
        </div>

        <!-- Save calories button -->
        <button data-js="btn-save-calories" onclick="saveCalories()"
          class="w-full h-12 rounded-2xl bg-orange font-anton text-[16px] tracking-wide text-white flex items-center justify-center gap-2 transition-all active:scale-[0.97] disabled:bg-[#E8E8E3] disabled:text-[#BBBBB5]">
          Сохранить
        </button>
      </div>
    </div>

    <!-- ── Goal ── -->
    <div class="anim-3">
      <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85] mb-2 px-1">Твоя цель</p>
      <div class="bg-white rounded-[18px] p-4 flex flex-col gap-2">
        <button class="goal-btn flex items-center gap-4 p-3 rounded-2xl border-2 border-transparent transition-all active:scale-[0.98]"
          data-goal="lose" onclick="pickGoal(this)">
          <div class="goal-icon w-10 h-10 rounded-[10px] bg-[#E8E8E3] flex items-center justify-center shrink-0 transition-colors">
            <svg class="w-5 h-5 transition-[stroke]" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22,17 13,8 8,13 2,7"/><polyline points="16,17 22,17 22,11"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-anton text-[17px] text-[#18180F]">Похудеть</p>
            <p class="font-roboto text-[12px] text-[#8C8C85] font-light">Дефицит ~400 ккал</p>
          </div>
          <div class="goal-check w-5 h-5 rounded-full border-2 border-[#E8E8E3] flex items-center justify-center shrink-0 transition-all">
            <svg class="goal-check-icon w-2.5 h-2.5 opacity-0 scale-50 transition-all" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </div>
        </button>

        <button class="goal-btn flex items-center gap-4 p-3 rounded-2xl border-2 border-transparent transition-all active:scale-[0.98]"
          data-goal="keep" onclick="pickGoal(this)">
          <div class="goal-icon w-10 h-10 rounded-[10px] bg-[#E8E8E3] flex items-center justify-center shrink-0 transition-colors">
            <svg class="w-5 h-5 transition-[stroke]" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-anton text-[17px] text-[#18180F]">Сохранить вес</p>
            <p class="font-roboto text-[12px] text-[#8C8C85] font-light">Поддержание</p>
          </div>
          <div class="goal-check w-5 h-5 rounded-full border-2 border-[#E8E8E3] flex items-center justify-center shrink-0 transition-all">
            <svg class="goal-check-icon w-2.5 h-2.5 opacity-0 scale-50 transition-all" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </div>
        </button>

        <button class="goal-btn flex items-center gap-4 p-3 rounded-2xl border-2 border-transparent transition-all active:scale-[0.98]"
          data-goal="gain" onclick="pickGoal(this)">
          <div class="goal-icon w-10 h-10 rounded-[10px] bg-[#E8E8E3] flex items-center justify-center shrink-0 transition-colors">
            <svg class="w-5 h-5 transition-[stroke]" viewBox="0 0 24 24" fill="none" stroke="#8C8C85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22,7 13,16 8,11 2,17"/><polyline points="16,7 22,7 22,13"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-anton text-[17px] text-[#18180F]">Набрать вес</p>
            <p class="font-roboto text-[12px] text-[#8C8C85] font-light">Профицит ~300 ккал</p>
          </div>
          <div class="goal-check w-5 h-5 rounded-full border-2 border-[#E8E8E3] flex items-center justify-center shrink-0 transition-all">
            <svg class="goal-check-icon w-2.5 h-2.5 opacity-0 scale-50 transition-all" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </div>
        </button>

        <button data-js="btn-save-goal" onclick="saveGoal()"
          class="w-full h-12 rounded-2xl bg-orange font-anton text-[16px] tracking-wide text-white flex items-center justify-center mt-1 transition-all active:scale-[0.97] disabled:bg-[#E8E8E3] disabled:text-[#BBBBB5]">
          Сохранить
        </button>
      </div>
    </div>

    <!-- ── Danger zone ── -->
    <div class="anim-4">
      <p class="text-[11px] font-medium tracking-[0.12em] uppercase text-[#8C8C85] mb-2 px-1">Данные</p>
      <div class="bg-white rounded-[18px] overflow-hidden">
        <button onclick="resetHistory()"
          class="w-full px-5 py-4 flex items-center gap-4 text-left active:bg-red-50 transition-colors border-b border-[#F0F0ED]">
          <div class="w-9 h-9 rounded-[10px] bg-red-50 flex items-center justify-center shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
            </svg>
          </div>
          <div>
            <p class="font-roboto text-[14px] font-medium text-[#E74C3C]">Очистить историю</p>
            <p class="font-roboto text-[12px] text-[#8C8C85] font-light">Удалить все логи за все дни</p>
          </div>
        </button>
        <button onclick="resetAll()"
          class="w-full px-5 py-4 flex items-center gap-4 text-left active:bg-red-50 transition-colors">
          <div class="w-9 h-9 rounded-[10px] bg-red-50 flex items-center justify-center shrink-0">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
          </div>
          <div>
            <p class="font-roboto text-[14px] font-medium text-[#E74C3C]">Сбросить всё</p>
            <p class="font-roboto text-[12px] text-[#8C8C85] font-light">Удалить пресеты, историю и настройки</p>
          </div>
        </button>
      </div>
    </div>

    <!-- Version -->
    <p class="text-center text-[12px] text-[#CCCCC8] font-light pb-2">Caloriq v0.1 MVP</p>

  </div>
</div>

<!-- Toast -->
<div data-js="toast" class="hidden fixed bottom-10 left-1/2 bg-[#18180F] text-white rounded-2xl px-5 py-3 z-50 shadow-lg whitespace-nowrap font-roboto text-[13px] font-medium" style="transform:translateX(-50%)"></div>

<script src="js/global.js"></script>
<script src="js/storage.js"></script>

<script>
  // ── DOM refs ───────────────────────────────────────────────────
  const inputCalories    = document.querySelector('[data-js="input-calories"]');
  const currentCalories  = document.querySelector('[data-js="current-calories"]');
  const currentGoalLabel = document.querySelector('[data-js="current-goal-label"]');
  const recalcPanel      = document.querySelector('[data-js="recalc-panel"]');
  const recalcChevron    = document.querySelector('[data-js="recalc-chevron"]');
  const calcResult       = document.querySelector('[data-js="calc-result"]');
  const calcResultValue  = document.querySelector('[data-js="calc-result-value"]');
  const calcAge          = document.querySelector('[data-js="calc-age"]');
  const calcWeight       = document.querySelector('[data-js="calc-weight"]');
  const calcHeight       = document.querySelector('[data-js="calc-height"]');
  const toast            = document.querySelector('[data-js="toast"]');

  // ── State ──────────────────────────────────────────────────────
  let recalcOpen  = false;
  let selectedSex = null;
  let selectedAct = null;
  let selectedGoal = localStorage.getItem('goal') || 'keep';

  const GOAL_LABELS = { lose: 'Похудеть', keep: 'Сохранить вес', gain: 'Набрать вес' };

  // ── Init ───────────────────────────────────────────────────────
  function init() {
    const calories = localStorage.getItem('calories') || '—';
    currentCalories.textContent  = parseInt(calories).toLocaleString('ru') || '—';
    currentGoalLabel.textContent = GOAL_LABELS[selectedGoal] || '';
    setActiveGoalBtn(selectedGoal);
  }

  // ── Calories section ───────────────────────────────────────────
  function toggleRecalc() {
    recalcOpen = !recalcOpen;
    recalcPanel.classList.toggle('hidden', !recalcOpen);
    recalcChevron.style.transform = recalcOpen ? 'rotate(180deg)' : '';
  }

  function pickSex(btn) {
    document.querySelectorAll('[data-js="sex-btn"]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSex = btn.dataset.sex;
    tryAutoCalc();
  }

  function pickAct(btn) {
    document.querySelectorAll('[data-js="act-btn"]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedAct = parseFloat(btn.dataset.act);
    tryAutoCalc();
  }

  function tryAutoCalc() {
    const age    = parseInt(calcAge.value);
    const weight = parseFloat(calcWeight.value);
    const height = parseFloat(calcHeight.value);
    if (!age || !weight || !height || !selectedSex || !selectedAct) return;

    const result = calcTDEE(age, weight, height, selectedSex, selectedAct);
    calcResultValue.textContent = result.toLocaleString('ru') + ' ккал';
    calcResult.classList.remove('hidden');
  }

  /**
   * Mifflin-St Jeor + activity + goal adjustment
   * @param {number} age
   * @param {number} weight - kg
   * @param {number} height - cm
   * @param {string} sex - 'male'|'female'
   * @param {number} activity - multiplier
   * @returns {number} recommended kcal
   */
  function calcTDEE(age, weight, height, sex, activity) {
    let bmr = sex === 'male'
      ? 10 * weight + 6.25 * height - 5 * age + 5
      : 10 * weight + 6.25 * height - 5 * age - 161;
    let tdee = Math.round(bmr * activity);
    if (selectedGoal === 'lose') tdee -= 400;
    if (selectedGoal === 'gain') tdee += 300;
    return Math.max(1200, tdee);
  }

  function applyCalc() {
    const val = calcResultValue.textContent.replace(/[^\d]/g, '');
    inputCalories.value = val;
    toggleRecalc();
  }

  function saveCalories() {
    const val = parseInt(inputCalories.value);
    if (!val || val < 800 || val > 9999) {
      showToast('Введи значение от 800 до 9999 ккал');
      return;
    }
    localStorage.setItem('calories', val);
    currentCalories.textContent = val.toLocaleString('ru');
    inputCalories.value = '';
    showToast('✅ Цель калорий обновлена');
    if (navigator.vibrate) navigator.vibrate(10);
  }

  // ── Goal section ───────────────────────────────────────────────
  function pickGoal(btn) {
    selectedGoal = btn.dataset.goal;
    setActiveGoalBtn(selectedGoal);
  }

  function setActiveGoalBtn(goal) {
    document.querySelectorAll('.goal-btn').forEach(b => {
      const active = b.dataset.goal === goal;
      b.classList.toggle('border-orange', active);
      b.classList.toggle('bg-orange-bg',  active);
      b.querySelector('.goal-icon').classList.toggle('bg-orange',    active);
      b.querySelector('.goal-icon').classList.toggle('bg-[#E8E8E3]', !active);
      b.querySelector('.goal-icon svg').setAttribute('stroke', active ? '#fff' : '#8C8C85');
      b.querySelector('.goal-check').classList.toggle('bg-orange',      active);
      b.querySelector('.goal-check').classList.toggle('border-orange',  active);
      b.querySelector('.goal-check').classList.toggle('border-[#E8E8E3]', !active);
      const icon = b.querySelector('.goal-check-icon');
      icon.classList.toggle('opacity-0',  !active);
      icon.classList.toggle('opacity-100', active);
      icon.classList.toggle('scale-50',    !active);
      icon.classList.toggle('scale-100',   active);
    });
  }

  function saveGoal() {
    localStorage.setItem('goal', selectedGoal);
    currentGoalLabel.textContent = GOAL_LABELS[selectedGoal];
    showToast('✅ Цель обновлена');
    if (navigator.vibrate) navigator.vibrate(10);
  }

  // ── Danger zone ────────────────────────────────────────────────
  function resetHistory() {
    if (!confirm('Удалить всю историю логов? Пресеты и настройки сохранятся.')) return;
    Object.keys(localStorage)
      .filter(k => k.startsWith('logs_'))
      .forEach(k => localStorage.removeItem(k));
    showToast('🗑 История очищена');
  }

  function resetAll() {
    if (!confirm('Сбросить всё? Это действие нельзя отменить.')) return;
    localStorage.clear();
    window.location.href = 'onboarding-1.html';
  }

  // ── Toast ──────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.remove('hidden', 'toast-out');
    toast.classList.add('toast-in');
    toastTimer = setTimeout(() => {
      toast.classList.remove('toast-in');
      toast.classList.add('toast-out');
      setTimeout(() => toast.classList.add('hidden'), 200);
    }, 2500);
  }

  // ── Init ───────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
